<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Quiz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <!-- Start screen -->
      <section id="start-screen" class="card screen">
        <h1 class="title">🐍 Python Quiz</h1>
        <p class="subtitle">
          Test your Python knowledge with
          <span id="total-count">0</span> community questions.
        </p>

        <div class="field">
          <label class="field-label" for="length-select">How many questions?</label>
          <div id="length-options" class="length-options" role="radiogroup" aria-label="Number of questions">
            <!-- length buttons injected by app.js -->
          </div>
        </div>

        <button id="start-btn" class="btn btn-primary btn-block" type="button">
          Start quiz
        </button>

        <p class="credit">
          Questions adapted from the community repo
          <a
            href="https://github.com/Ebazhanov/linkedin-skill-assessments-quizzes"
            target="_blank"
            rel="noopener noreferrer"
            >Ebazhanov/linkedin-skill-assessments-quizzes</a
          >. All credit to the original authors.
        </p>
      </section>

      <!-- Quiz screen -->
      <section id="quiz-screen" class="card screen hidden">
        <header class="quiz-header">
          <div class="progress-meta">
            <span id="progress-label">Question 1 of 10</span>
            <span id="score-label" class="score">Score: 0</span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </header>

        <div id="question-text" class="question-text"></div>

        <div id="options" class="options"></div>

        <div id="feedback" class="feedback" aria-live="polite"></div>

        <footer class="quiz-footer">
          <button id="quit-btn" class="btn btn-ghost" type="button">Quit</button>
          <button id="next-btn" class="btn btn-primary hidden" type="button">Next</button>
        </footer>
      </section>

      <!-- Results screen -->
      <section id="results-screen" class="card screen hidden">
        <h1 class="title">Results</h1>
        <div class="result-score">
          <span id="result-fraction">0 / 0</span>
          <span id="result-percent" class="result-percent">0%</span>
        </div>
        <p id="result-message" class="subtitle"></p>

        <div id="review" class="review"></div>

        <button id="restart-btn" class="btn btn-primary btn-block" type="button">
          Try another quiz
        </button>
      </section>
    </main>

    <script src="questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
